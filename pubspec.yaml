name: guardaya_app
description: "Aplicacion GuardaYa - SaaS de Gestion de Ventas con OCR"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  image_picker: ^1.1.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Backend - Supabase
  supabase_flutter: ^2.8.4

  # Local Database (Offline)
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # Connectivity
  connectivity_plus: ^6.1.3

  # Background Sync
  workmanager: ^0.5.2

  # OCR
  google_mlkit_text_recognition: ^0.14.0

  # Secure Storage (Session)
  flutter_secure_storage: ^9.2.4

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Functional Programming
  fpdart: ^1.1.1
  equatable: ^2.0.7

  # DI
  get_it: ^8.0.3
  injectable: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/